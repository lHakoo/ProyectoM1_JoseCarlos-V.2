<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas de Colores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-noise"></div>

    <header>
        <div class="header-inner">
            <div class="logo-area">
                <span class="logo-dot"></span>
                <h1>Paletas</h1>
            </div>
            <div class="controles">
                <div class="control-group">
                    <label for="cantidad">Colores</label>
                    <select id="cantidad">
                        <option value="6">6</option>
                        <option value="8" selected>8</option>
                        <option value="9">9</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="formato">Formato</label>
                    <select id="formato">
                        <option value="HEX">HEX</option>
                        <option value="RGBA">RGBA</option>
                    </select>
                </div>
                <button id="btn-generar" aria-label="Generar nueva paleta de colores">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                        <path d="M21 2v6h-6M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6M21 12a9 9 0 01-15 6.7L3 16"/>
                    </svg>
                    Generar
                </button>
                <button id="btn-guardar" aria-label="Guardar paleta actual">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Guardar
                </button>
            </div>
        </div>
    </header>

    <main>
        <section id="contenedor-paleta" aria-label="Paleta de colores generada"></section>

        <!-- Paletas guardadas -->
        <section id="seccion-guardadas" aria-label="Paletas guardadas" hidden>
            <div class="guardadas-header">
                <h2>Guardadas</h2>
                <button id="btn-limpiar" class="btn-ghost" aria-label="Eliminar todas las paletas guardadas">Limpiar todo</button>
            </div>
            <div id="lista-guardadas"></div>
        </section>
    </main>

    <div id="live-region" class="sr-only" aria-live="polite"></div>

    <script src="script.js" defer></script>
</body>
</html>
